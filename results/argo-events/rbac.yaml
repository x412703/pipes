---
apiVersion: v1
kind: Namespace
metadata:
  name: argo-events

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-events-sa
  namespace: argo-events

---
# Role for general Argo Events operations within the argo-events namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-events-role
  namespace: argo-events
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-events-rolebinding
  namespace: argo-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-events-role
subjects:
  - kind: ServiceAccount
    name: argo-events-sa
    namespace: argo-events

---
# The Sensor uses an argoWorkflow trigger which submits Workflow objects
# into the argo-workflows namespace.  A plain Role can only grant
# permissions within its own namespace, so we need a ClusterRole +
# a RoleBinding that is applied in the TARGET namespace (argo-workflows).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-events-workflow-submitter
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates"]
    verbs: ["create", "get", "list", "watch", "update", "patch"]

---
# Bind the ClusterRole inside the argo-workflows namespace so that
# argo-events-sa can create Workflow objects there.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-events-workflow-submitter-binding
  namespace: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-events-workflow-submitter
subjects:
  - kind: ServiceAccount
    name: argo-events-sa
    namespace: argo-events
