---
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: bitbucket-webhook
  namespace: argo-events
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000

  bitbucketserver:
    bitbucket:
      webhook:
        port: "12000"
        endpoint: /bitbucket
        method: POST
      repositories:
        - projectKey: "PROJ"
          repositorySlug: "repository"
      events:
        - "repo:refs_changed"
        - "pr:merged"
      webhookSecret:
        name: bitbucket-webhook-token
        key: token
      bitbucketserverBaseURL: https://bitbucket.example.com/rest
