---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: bitbucket-sensor-push-dev
  namespace: argo-events
spec:
  # The Sensor pod must run with a service account that has permission
  # to create Workflow objects in the argo-workflows namespace.
  template:
    serviceAccountName: argo-events-sa

  eventBusName: default

  dependencies:
    # Dependency – push to the dev branch.
    # Payload path: changes[0].ref.displayId == "dev"
    # EventSource eventName: bitbucket (subscribed to repo:refs_changed + pr:merged)
    - name: push-dev
      eventSourceName: bitbucket-webhook
      eventName: bitbucket
      filters:
        data:
          - path: body.eventKey
            type: string
            value: ["repo:refs_changed"]
          - path: body.changes.0.ref.displayId
            type: string
            value: ["dev"]

  triggers:
    # ── Trigger: push → dev ───────────────────────────────────────────────────
    - template:
        name: dev-push-trigger
        conditions: "push-dev"
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: ci-pipeline-dev-
                namespace: argo-workflows
              spec:
                workflowTemplateRef:
                  name: ci-pipeline-template
                arguments:
                  parameters:
                    - name: commit-sha
                      value: ""
                    - name: repo-name
                      value: ""
                    - name: project-key
                      value: ""
                    - name: branch
                      value: "dev"
          parameters:
            - src:
                dependencyName: push-dev
                dataKey: body.changes.0.toHash
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: push-dev
                dataKey: body.repository.slug
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: push-dev
                dataKey: body.repository.project.key
              dest: spec.arguments.parameters.2.value
