---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd

---
# All three Applications point to the main branch.  The project uses
# Kustomize overlays so dev and prod manifests live side-by-side in a
# single branch rather than being split across branches.
#
# Both environments deploy into the shared "app" namespace because the
# single Ingress resource needs to reference both Services (Kubernetes
# Ingress can only target Services in its own namespace).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: multi-env-applicationset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            path: k8s/overlays/dev
          - env: prod
            path: k8s/overlays/prod
          - env: ingress
            path: k8s/ingress
  template:
    metadata:
      name: "repository-{{env}}"
    spec:
      project: default
      source:
        repoURL: git@bitbucket.example.com:proj/repository.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: app
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
