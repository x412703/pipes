---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app

# Prefix all resource names with "dev-" so dev and prod resources
# coexist in the same namespace without name collisions.
namePrefix: dev-

# Add an instance label to all resources AND their selectors.
# This ensures the dev Deployment only selects dev pods (not prod),
# and the dev Service only routes to dev pods.
labels:
  - pairs:
      app.kubernetes.io/instance: dev
    includeSelectors: true

resources:
  - ../../base

# Override the container image with the dev tag.
# After CI runs on the dev branch, update the newTag to the
# specific commit SHA for traceability, e.g.:
#   kustomize edit set image harbor.example.com/library/repository:dev-<sha>
images:
  - name: harbor.example.com/library/repository
    newTag: dev-latest
