---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app

# Prefix all resource names with "prod-" so dev and prod resources
# coexist in the same namespace without name collisions.
namePrefix: prod-

# Add an instance label to all resources AND their selectors.
# This ensures the prod Deployment only selects prod pods (not dev),
# and the prod Service only routes to prod pods.
labels:
  - pairs:
      app.kubernetes.io/instance: prod
    includeSelectors: true

resources:
  - ../../base

# Override the container image with the prod (main branch) tag.
# After CI runs on main, update the newTag to the specific commit
# SHA for traceability, e.g.:
#   kustomize edit set image harbor.example.com/library/repository:main-<sha>
images:
  - name: harbor.example.com/library/repository
    newTag: main-latest

# Production gets more replicas and higher resource limits.
replicas:
  - name: app
    count: 2

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
      spec:
        template:
          spec:
            containers:
              - name: app
                resources:
                  requests:
                    cpu: 250m
                    memory: 256Mi
                  limits:
                    cpu: "1"
                    memory: 512Mi
