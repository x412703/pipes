apiVersion: apps/v1
kind: Deployment
metadata:
  name: service1
  labels:
    app.kubernetes.io/name: service1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: service1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: service1
    spec:
      containers:
        - name: service1
          image: harbor.example.com/library/service1:latest
          envFrom:
            - secretRef:
                name: service1-secret
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
